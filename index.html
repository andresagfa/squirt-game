<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toronjito Platformer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #87CEEB, #98D8E8);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        canvas {
            border: 2px solid #333;
            background: transparent;
        }
        
        .game-container {
            text-align: center;
            position: relative;
        }
        
        .logo {
            position: absolute;
            top: 20px;
            width: 200px;
            left: -20px;
            z-index: 10;
        }
        
        .logo-img {
            width: 200px;
            height: 100px;
            object-fit: contain;
        }
        
        .score {
            position: absolute;
            top: 20px;
            right: 290px;
            font-size: 20px;
            font-weight: bold;
            color: #59ac27;
            text-shadow: 1px 1px 1px rgba(2, 96, 4, 0.791);
            z-index: 10;
        }
        
        /* Hide UI elements during start and game over screens */
        body.start-screen .logo,
        body.start-screen .score,
        body.start-screen .high-score,
        body.game-over-screen .logo,
        body.game-over-screen .score,
        body.game-over-screen .high-score {
            display: none;
        }
        
        .puntos-img {
            width: 190px;
            height: 40px;
            object-fit: contain;
            position: absolute;
            left: -10px;
            top: 0;
        }
        
        .score-number {
            position: absolute;
            left: 70px;
            top: 9px;
            z-index: 11;
            /* You can adjust the text position here by modifying the margin or transform properties */
        }
        
        .high-score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #59ac27;
            text-shadow: 1px 1px 1px rgba(2, 96, 4, 0.791);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .record-img {
            width: 190px;
            height: 40px;
            object-fit: contain;
            position: relative;
            left: 70px;
        }
        
        .record-number {
            position: relative;
            z-index: 11;
           
            right: 20px;
            /* You can adjust the text position here by modifying the margin or transform properties */
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="logo">
            <img src="assets/AMBIENTE/INICIO/Squirt-logo-titulo.png" alt="Squirt Logo" class="logo-img">
        </div>
        <div class="score">
            <img src="assets/BOTONES/puntos.png" alt="Puntos" class="puntos-img ">
            <span id="score" class="score-number">0</span>
        </div>
        <div class="high-score">
            <img src="assets/BOTONES/record.png" alt="Record" class="record-img ">
            <span id="highScore" class="record-number">0</span>
        </div>
        <canvas id="gameCanvas" width="900" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');

        // Asset loading
        const assets = {
            // Toronjito sprites
            toronjitoJump: new Image(),
            toronjitoRun1: new Image(),
            toronjitoRun2: new Image(),
            // Background - only JPG/PNG
            sky: new Image(),
            ground: new Image(),
            bushes: new Image(),
            // Obstacles - single obstacle asset
            obstaculoPng: new Image(),
            // Collectibles
            corcholata: new Image(),
            // UI - only PNG
            puntos: new Image(),
            record: new Image(),
            gameover: new Image(),
            puntajeFinal: new Image(),
            // Start screen
            inicioEjemplo: new Image(),
            jugar: new Image()
        };

        // Load assets - only JPG/PNG files
        function loadAssets() {
            assets.toronjitoJump.src = 'assets/PERSONAJE/TORONJITO_Brincando.png';
            assets.toronjitoRun1.src = 'assets/PERSONAJE/TORONJITO_Corriendo-01.png';
            assets.toronjitoRun2.src = 'assets/PERSONAJE/TORONJITO_Corriendo-02.png';
            assets.sky.src = 'assets/AMBIENTE/cielo.jpg';
            assets.ground.src = 'assets/AMBIENTE/Piso.jpg';
            assets.bushes.src = 'assets/AMBIENTE/arbustos.png';
            assets.obstaculoPng.src = 'assets/AMBIENTE/obstaculopng.png';
            assets.corcholata.src = 'assets/PERSONAJE/Corcholata.png';
            assets.puntos.src = 'assets/BOTONES/puntos.png';
            assets.record.src = 'assets/BOTONES/record.png';
            assets.gameover.src = 'assets/AMBIENTE/CIERRE/GameOver.png';
            assets.puntajeFinal.src = 'assets/AMBIENTE/CIERRE/PUNTAJE-FINAL02.png';
            assets.inicioEjemplo.src = 'assets/AMBIENTE/INICIO/inicio-ejemplo.jpg';
            assets.jugar.src = 'assets/AMBIENTE/INICIO/jugar.png';
        }

        // Game variables
        let gameState = 'start'; // start, playing, gameOver
        let score = 0;
        let highScore = localStorage.getItem('toronjitoHighScore') || 0;
        let gameSpeed = 7; // Reduced from 8 for slightly slower obstacles
        let gravity = 0.6;
        let jumpPower = -14; // Increased from -12 for faster jumps
        let assetsLoaded = false;
        
        highScoreElement.textContent = highScore;

        // Update UI visibility based on game state
        function updateUIVisibility() {
            document.body.className = '';
            if (gameState === 'start') {
                document.body.classList.add('start-screen');
            } else if (gameState === 'gameOver') {
                document.body.classList.add('game-over-screen');
            }
        }

        // Load assets on start
        loadAssets();

        // Initialize UI visibility
        updateUIVisibility();

        // Player (Toronjito)
        class Player {
            constructor() {
                this.x = 100;
                this.y = canvas.height - 200; // Adjusted for pixel art ground level
                this.width = 50; // Scaled for pixel art style
                this.height = 50;
                this.velocityY = 0;
                this.jumping = false;
                this.grounded = false;
                this.animationFrame = 0;
                this.animationSpeed = 0.2;
                this.runFrame = 0;
            }

            update() {
                // Apply gravity
                this.velocityY += gravity;
                this.y += this.velocityY;

                // Ground collision - adjusted for pixel art ground
                const groundY = canvas.height - 120; // Higher ground level for pixel art
                if (this.y + this.height > groundY) {
                    this.y = groundY - this.height;
                    this.velocityY = 0;
                    this.grounded = true;
                    this.jumping = false;
                } else {
                    this.grounded = false;
                }

                // Animation
                if (this.grounded && gameState === 'playing') {
                    this.runFrame += this.animationSpeed;
                    if (this.runFrame >= 2) this.runFrame = 0;
                }
            }

            jump() {
                if (this.grounded) {
                    this.velocityY = jumpPower;
                    this.jumping = true;
                    this.grounded = false;
                }
            }

            draw() {
                ctx.save();
                
                // Draw Toronjito character with actual sprites
                if (this.jumping || !this.grounded) {
                    // Jumping sprite - always use brincando
                    if (assetsLoaded && assets.toronjitoJump.complete) {
                        ctx.drawImage(assets.toronjitoJump, this.x, this.y, this.width, this.height);
                    } else {
                        // Fallback placeholder
                        ctx.fillStyle = '#FFA500';
                        ctx.fillRect(this.x, this.y, this.width, this.height);
                        ctx.fillStyle = '#FF6347';
                        ctx.fillRect(this.x + 10, this.y + 10, 15, 15);
                        ctx.fillRect(this.x + 35, this.y + 10, 15, 15);
                    }
                } else {
                    // Running animation - smoother transition
                    const runSprite = Math.floor(this.runFrame) === 0 ? assets.toronjitoRun1 : assets.toronjitoRun2;
                    if (assetsLoaded && runSprite.complete) {
                        // Subtle bounce animation for running
                        const bounceOffset = Math.abs(Math.sin(this.runFrame * Math.PI)) * 3;
                        ctx.drawImage(runSprite, this.x, this.y - bounceOffset, this.width, this.height);
                    } else {
                        // Fallback placeholder with smoother animation
                        const bounceOffset = Math.abs(Math.sin(this.runFrame * Math.PI)) * 3;
                        ctx.fillStyle = '#FFA500';
                        ctx.fillRect(this.x, this.y - bounceOffset, this.width, this.height);
                        ctx.fillStyle = '#FF6347';
                        ctx.fillRect(this.x + 10, this.y + 10 - bounceOffset, 15, 15);
                        ctx.fillRect(this.x + 35, this.y + 10 - bounceOffset, 15, 15);
                    }
                }
                
                ctx.restore();
            }
        }

        // Obstacle class - using single obstacle asset with proper hitbox
        class Obstacle {
            constructor(x) {
                this.x = x;
                // Adjust hitbox to match actual PNG dimensions
                this.width = 45; // Reduced from 60 to match PNG
                this.height = 60; // Reduced from 80 to match PNG
                this.y = canvas.height - 120 - this.height;
                this.passed = false;
            }

            update() {
                this.x -= gameSpeed;
            }

            draw() {
                // Use single obstacle asset with actual PNG size
                if (assetsLoaded && assets.obstaculoPng.complete) {
                    ctx.drawImage(assets.obstaculoPng, this.x, this.y, this.width, this.height);
                }
            }
        }

        // Coin class (now using corcholata)
        class Corcholata {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 30;
                this.collected = false;
                this.rotation = 0;
                this.floatOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.x -= gameSpeed;
                this.rotation += 0.05;
                // Floating animation
                this.floatOffset += 0.1;
            }

            draw() {
                if (this.collected) return;
                
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2 + Math.sin(this.floatOffset) * 5);
                ctx.rotate(this.rotation);
                
                // Draw corcholata sprite
                if (assetsLoaded && assets.corcholata.complete) {
                    ctx.drawImage(assets.corcholata, -this.width/2, -this.height/2, this.width, this.height);
                } else {
                    // Fallback placeholder
                    ctx.fillStyle = '#FF69B4';
                    ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                    ctx.fillStyle = '#FF1493';
                    ctx.fillRect(-this.width/2 + 5, -this.height/2 + 5, this.width - 10, this.height - 10);
                }
                
                ctx.restore();
            }
        }

        // Background elements
        class Cloud {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = Math.random() * 0.5 + 0.2;
                this.scale = Math.random() * 0.5 + 0.5;
            }

            update() {
                this.x -= this.speed;
                if (this.x + 100 < 0) {
                    this.x = canvas.width + 100;
                    this.y = Math.random() * 150 + 50;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.arc(30, 0, 35, 0, Math.PI * 2);
                ctx.arc(60, 0, 25, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Game objects
        let player = new Player();
        let obstacles = [];
        let corcholatas = [];
        let clouds = [];
        let restartButton = {
            x: canvas.width / 2 - 75,
            y: canvas.height / 2 + 100,
            width: 150,
            height: 50
        };

        // Initialize clouds
        for (let i = 0; i < 3; i++) {
            clouds.push(new Cloud(
                Math.random() * canvas.width,
                Math.random() * 150 + 50
            ));
        }

        // Event listeners
        canvas.addEventListener('click', handleInput);
        document.addEventListener('keydown', handleInput);

        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            e.preventDefault();
            
            if (gameState === 'start') {
                gameState = 'playing';
                updateUIVisibility();
                player.jump();
            } else if (gameState === 'playing') {
                player.jump();
            } else if (gameState === 'gameOver') {
                // Check if restart button was clicked
                if (e.type === 'click') {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    // Check if click is on restart button
                    if (x >= restartButton.x && x <= restartButton.x + restartButton.width &&
                        y >= restartButton.y && y <= restartButton.y + restartButton.height) {
                        resetGame();
                        return;
                    }
                }
                // Space key or any click restarts the game
                if (e.type === 'keydown' || e.type === 'click') {
                    resetGame();
                }
            }
        }

        function spawnObstacle() {
            // Reduce maximum obstacles from 3 to 2 for fewer obstacles
            if (obstacles.length < 2) {
                const lastObstacle = obstacles[obstacles.length - 1];
                if (!lastObstacle || lastObstacle.x < canvas.width - 300) {
                    // Spawn single obstacle
                    obstacles.push(new Obstacle(canvas.width));
                    console.log('Spawned obstacle, total:', obstacles.length);
                    
                    // Add corcholatas above the obstacle
                    const corcholataY = canvas.height - 120 - 150 - Math.random() * 100;
                    corcholatas.push(new Corcholata(canvas.width + 20, corcholataY));
                    corcholatas.push(new Corcholata(canvas.width + 50, corcholataY));
                    corcholatas.push(new Corcholata(canvas.width + 80, corcholataY));
                }
            }
        }

        function resetGame() {
            player = new Player();
            obstacles = [];
            corcholatas = [];
            score = 0;
            scoreElement.textContent = score;
            gameSpeed = 7; // Reset with slightly slower speed
            gameState = 'start';
            updateUIVisibility();
        }

        function gameOver() {
            gameState = 'gameOver';
            updateUIVisibility();
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('toronjitoHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
        }

        function checkCollisions() {
            // Check obstacle collisions
            obstacles.forEach(obstacle => {
                if (player.x < obstacle.x + obstacle.width &&
                    player.x + player.width > obstacle.x &&
                    player.y < obstacle.y + obstacle.height &&
                    player.y + player.height > obstacle.y) {
                    gameOver();
                }
                
                // Check if player passed obstacle
                if (!obstacle.passed && player.x > obstacle.x + obstacle.width) {
                    obstacle.passed = true;
                    score += 10;
                    scoreElement.textContent = score;
                    
                    // Increase difficulty
                    if (score % 50 === 0) {
                        gameSpeed += 0.5;
                    }
                }
            });

            // Check corcholata collisions
            corcholatas.forEach(corcholata => {
                if (!corcholata.collected) {
                    if (player.x < corcholata.x + corcholata.width &&
                        player.x + player.width > corcholata.x &&
                        player.y < corcholata.y + corcholata.height &&
                        player.y + player.height > corcholata.y) {
                        corcholata.collected = true;
                        score += 5;
                        scoreElement.textContent = score;
                    }
                }
            });
        }

        function gameOver() {
            gameState = 'gameOver';
            updateUIVisibility();
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('toronjitoHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
        }

        function drawBackground() {
            // Use actual background assets only during gameplay
            if (gameState === 'playing' || gameState === 'gameOver') {
                if (assetsLoaded && assets.sky.complete) {
                    ctx.drawImage(assets.sky, 0, 0, canvas.width, canvas.height);
                } else {
                    // Minimal fallback
                    ctx.fillStyle = '#87CEEB';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            }
            // During start state, let drawStartScreen handle the background
        }

        function drawGround() {
            // Use actual ground assets
            if (assetsLoaded && assets.ground.complete) {
                ctx.drawImage(assets.ground, 0, canvas.height - 120, canvas.width, 120);
            }
            
            // Use actual bushes if available - position on top of ground
            if (assetsLoaded && assets.bushes.complete) {
                ctx.drawImage(assets.bushes, 0, canvas.height - 180, canvas.width, 60);
            }
        }

        function drawStartScreen() {
            // Use only the background image without any overlays
            if (assetsLoaded && assets.inicioEjemplo.complete) {
                ctx.drawImage(assets.inicioEjemplo, 0, 0, canvas.width, canvas.height);
            } else {
                // Fallback background
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function drawGameOverScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw game over image
            if (assetsLoaded && assets.gameover.complete) {
                ctx.drawImage(assets.gameover, canvas.width / 2 - 150, canvas.height / 2 - 150, 300, 100);
            } else {
                // Fallback game over text
                ctx.fillStyle = 'white';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 80);
            }
            
            // Draw puntaje-final image
            if (assetsLoaded && assets.puntajeFinal.complete) {
                ctx.drawImage(assets.puntajeFinal, canvas.width / 2 - 100, canvas.height / 2 - 10, 200, 60);
            }
            
            ctx.fillStyle = 'white';
            ctx.font = '28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(score, canvas.width / 1.77, canvas.height / 2.33 + 60);
            
            if (score === highScore && score > 0) {
                ctx.fillStyle = '#FFD700';
                ctx.fillText('NEW HIGH SCORE!', canvas.width / 2, canvas.height / 2 + 60);
            }
            
            // Always show restart button
            if (gameState === 'gameOver') {
                // Fallback button
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(restartButton.x, restartButton.y, restartButton.width, restartButton.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('RESTART', restartButton.x + restartButton.width/2, restartButton.y + restartButton.height/2);
            }
        }

        function gameLoop() {
            // Check if assets are loaded
            if (!assetsLoaded) {
                const allLoaded = Object.values(assets).every(asset => {
                    return asset.complete || asset.naturalWidth === 0;
                });
                if (allLoaded) {
                    assetsLoaded = true;
                }
            }
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            drawBackground();
            drawGround();
            
            if (gameState === 'playing') {
                // Update game objects
                player.update();
                spawnObstacle();
                
                obstacles.forEach(obstacle => obstacle.update());
                corcholatas.forEach(corcholata => corcholata.update());
                
                // Remove off-screen objects
                obstacles = obstacles.filter(obstacle => obstacle.x + obstacle.width > -50);
                corcholatas = corcholatas.filter(corcholata => corcholata.x > -50 && !corcholata.collected);
                
                // Check collisions
                checkCollisions();
            }
            
            // Draw game objects
            obstacles.forEach(obstacle => obstacle.draw());
            corcholatas.forEach(corcholata => corcholata.draw());
            player.draw();
            
            // Draw UI based on game state
            if (gameState === 'start') {
                drawStartScreen();
            } else if (gameState === 'gameOver') {
                drawGameOverScreen();
            }
            
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
